version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: soma_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_DB_PATH=./chroma_db_docker
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - ./chroma_db_docker:/app/chroma_db_docker
      - ./data:/app/data
      - sqlite_data:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: soma_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
